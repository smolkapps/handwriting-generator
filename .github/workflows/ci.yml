name: CI
on:
  push:
  pull_request:
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: install
        working-directory: .
        run: python -m pip install -e ".[test]" || python -m pip install -e ".[dev]" || python -m pip install -e . pytest
      - name: pytest
        working-directory: .
        run: python -m pytest -q
